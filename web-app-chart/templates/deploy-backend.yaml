apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: {{ .Values.namespace }}
spec:
  replicas: {{ .Values.backend.replicaCount }}
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      initContainers:
        - name: wait-for-backend
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z backend-service 8080; do
                echo "Waiting for backend..."
                sleep 2
              done
      containers:
        - name: backend
          image: "{{ .Values.backend.image.repository }}:{{ .Values.backend.image.tag }}"
          ports:
            - containerPort: 8080
          env:
            - name: DB_HOST
              value: postgres-service

            - name: DB_NAME
              valueFrom:
                secretKeyRef:
                  name: backend-secret
                  key: db-name

            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: backend-secret
                  key: db-user

            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: backend-secret
                  key: db-password

          resources:
{{ toYaml .Values.backend.resources | indent 12 }}
